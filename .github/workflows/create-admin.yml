name: Create Admin

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: Password to set on the admin account
        required: true
        type: string

jobs:
  create-admin:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: /opt/time-audit
      SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask password input
        run: |
          echo "::add-mask::${{ github.event.inputs.admin_password }}"

      - name: Add SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Create or update .env
        run: |
          ADMIN_PASSWORD_B64=$(printf '%s' '${{ github.event.inputs.admin_password }}' | base64 -w0)
          echo "::add-mask::$ADMIN_PASSWORD_B64"
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} <<EOF
          set -e
          cd ${DEPLOY_PATH}
          export TIME_AUDIT_ADMIN_PASSWORD="\$(printf '%s' '$ADMIN_PASSWORD_B64' | base64 -d)"
          sudo -E /opt/time-audit/venv/bin/python -c "from pathlib import Path; import os; env_path = Path('.env'); key = 'TIME_AUDIT_ADMIN_PASSWORD'; value = os.environ[key]; lines = env_path.read_text(encoding='utf-8').splitlines() if env_path.exists() else []; updated = any(line.startswith(f'{key}=') for line in lines); new_lines = [f'{key}={value}' if line.startswith(f'{key}=') else line for line in lines]; new_lines = new_lines if updated else new_lines + [f'{key}={value}']; env_path.write_text('\\n'.join(new_lines) + '\\n', encoding='utf-8')"
          EOF